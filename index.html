<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Mass ITN Campaign 2026 | Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #dce2e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      padding: 20px;
    }

    .phone-app {
      max-width: 380px;
      width: 100%;
      height: 720px;
      background: white;
      border-radius: 42px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      background: #b3d9ff;
      padding: 32px 20px 24px 20px;
      flex-shrink: 0;
      text-align: center;
    }

    .campaign-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a2a3f;
      letter-spacing: -0.3px;
      margin: 0 0 16px 0;
      line-height: 1.3;
    }

    .logo-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-image {
      height: 56px;
      width: auto;
      max-width: 100px;
      object-fit: contain;
      display: block;
    }

    .back-button {
      background: rgba(26, 42, 63, 0.1);
      border: none;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      color: #1a2a3f;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      margin: 12px 16px 8px 16px;
      width: fit-content;
    }

    .app-body {
      flex: 1;
      background: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 24px 20px;
      gap: 24px;
      overflow-y: auto;
    }

    .login-title {
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      color: #1a2a3f;
      margin-bottom: 8px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 14px;
      color: #6f7d95;
      margin-bottom: 16px;
    }

    .loading-indicator {
      text-align: center;
      padding: 20px;
      color: #2c5a7a;
      font-size: 14px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-group label {
      font-size: 14px;
      font-weight: 500;
      color: #1a2a3f;
    }

    .input-group input {
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 16px;
      background: white;
    }

    .input-group input:focus {
      outline: none;
      border-color: #b3d9ff;
      box-shadow: 0 0 0 3px rgba(179, 217, 255, 0.3);
    }

    .login-btn {
      background: #b3d9ff;
      border: none;
      padding: 14px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 600;
      color: #1a2a3f;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .login-btn:active {
      transform: scale(0.97);
    }

    .login-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-message {
      color: #e74c3c;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
    }

    .dashboard-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #eef2f8;
    }

    .user-info {
      font-size: 13px;
      color: #1a3a5c;
      background: rgba(179, 217, 255, 0.4);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .logout-btn {
      background: rgba(26, 42, 63, 0.1);
      border: none;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 500;
      color: #1a2a3f;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cards-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 16px;
      gap: 16px;
    }

    .card {
      background: #b3d9ff;
      border-radius: 24px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
      cursor: pointer;
      width: 100%;
    }

    .card:active {
      transform: scale(0.98);
      background: #a0ccee;
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
    }

    .card-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 28px;
    }

    .card-icon svg {
      width: 28px;
      height: 28px;
      stroke: #1a3a5c;
      stroke-width: 1.7;
      fill: none;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a2a3f;
    }

    .card-arrow svg {
      width: 20px;
      height: 20px;
      stroke: #1a3a5c;
      stroke-width: 2;
      fill: none;
    }

    .iframe-container {
      flex: 1;
      display: none;
      flex-direction: column;
      background: #f5f7fa;
    }

    .iframe-wrapper {
      flex: 1;
      position: relative;
      width: 100%;
    }

    .module-iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    .app-footer {
      background: #b3d9ff;
      padding: 16px 24px 18px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .footer-text {
      font-size: 17px;
      font-weight: 600;
      color: #1a2a3f;
    }

    .home-indicator {
      background: #cbdae6;
      width: 130px;
      height: 5px;
      border-radius: 100px;
      margin: 6px auto 10px auto;
      flex-shrink: 0;
    }

    .cards-container::-webkit-scrollbar {
      width: 4px;
    }
    .cards-container::-webkit-scrollbar-track {
      background: #f0f2f5;
      border-radius: 10px;
    }
    .cards-container::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    @media (max-width: 460px) {
      .phone-app { height: 680px; border-radius: 36px; }
      .campaign-title { font-size: 20px; }
      .app-header { padding: 24px 16px 20px 16px; }
      .logo-image { height: 48px; max-width: 80px; }
      .card { padding: 14px 18px; }
      .card-icon { width: 40px; height: 40px; }
      .card-icon svg { width: 22px; height: 22px; }
      .card-title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="phone-app">
    <div class="app-header">
      <h1 class="campaign-title">Mass ITN Campaign 2026</h1>
      <div class="logo-wrapper">
        <img src="logo.png" alt="Logo" class="logo-image" onerror="this.style.opacity='0.5'; this.style.border='1px dashed #2c5a7a'; this.alt='Logo'">
      </div>
    </div>

    <div class="app-body">
      <div id="loginScreen" class="login-container">
        <div>
          <div class="login-title">Welcome Back</div>
          <div class="login-subtitle">Sign in to access your dashboard</div>
        </div>
        
        <div id="loadingMessage" class="loading-indicator">Loading user data from user.csv...</div>

        <div id="loginForm" style="display: none;">
          <div class="input-group">
            <label>Username</label>
            <input type="text" id="usernameInput" placeholder="Enter username" autocomplete="off">
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="passwordInput" placeholder="Enter password">
          </div>
          <button class="login-btn" id="loginBtn">Sign In</button>
          <div id="loginError" class="error-message"></div>
        </div>
      </div>

      <div id="dashboardView" style="display: none; flex: 1; flex-direction: column;">
        <div class="dashboard-container">
          <div class="dashboard-header">
            <span id="dashboardUserInfo" class="user-info"></span>
            <button id="logoutBtn" class="logout-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
              </svg>
              Logout
            </button>
          </div>
          <div id="cardsContainer" class="cards-container"></div>
        </div>
      </div>

      <div id="iframeView" class="iframe-container">
        <button id="backButton" class="back-button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          Back to Dashboard
        </button>
        <div class="iframe-wrapper">
          <iframe id="moduleIframe" class="module-iframe" src="about:blank" title="Module Content"></iframe>
        </div>
      </div>
    </div>

    <div class="app-footer">
      <span class="footer-text">ICF-SL 2026</span>
    </div>
    <div class="home-indicator"></div>
  </div>

  <script>
    // Module definitions with icons and URLs
    const allModules = {
      "Attendance": { url: "attendance.html", icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /><path d="M22 21v-2a4 4 0 0 0-3-3.85" /></svg>` },
      "Registration": { url: "registration.html", icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.85" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></svg>` },
      "Distribution": { url: "distribution.html", icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" /><path d="M8 8h8v8H8z" /><path d="M12 4v4" /><path d="M12 16v4" /><path d="M4 12h4" /><path d="M16 12h4" /></svg>` },
      "Stock": { url: "stock.htm", icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></svg>` },
      "Monitoring": { url: "monitoring.html", icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9h-4m-7 9A9 9 0 0 1 3 12m9 9v-4M3 12a9 9 0 0 1 9-9m-9 9h4m7-9a9 9 0 0 1 9 9" /><circle cx="12" cy="12" r="3" /></svg>` },
      "Reconciliation": { url: "reconciliation.html", icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M14 10l6-6M3 16h5v5M10 14l-6 6" /><path d="M21 16v5h-5M16 21l6-6M3 8h5V3M10 10l-6-6" /></svg>` }
    };

    // Order of modules (same as CSV columns)
    const moduleOrder = ["Attendance", "Registration", "Distribution", "Stock", "Monitoring", "Reconciliation"];

    const loginScreen = document.getElementById('loginScreen');
    const dashboardView = document.getElementById('dashboardView');
    const cardsContainer = document.getElementById('cardsContainer');
    const iframeView = document.getElementById('iframeView');
    const moduleIframe = document.getElementById('moduleIframe');
    const backButton = document.getElementById('backButton');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameInput = document.getElementById('usernameInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');
    const dashboardUserInfo = document.getElementById('dashboardUserInfo');
    const loadingMessage = document.getElementById('loadingMessage');
    const loginForm = document.getElementById('loginForm');

    let userDatabase = [];
    let currentUser = null;

    function parseCSVRow(row) {
      const result = [];
      let current = '';
      let inQuotes = false;
      
      for (let i = 0; i < row.length; i++) {
        const char = row[i];
        if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current);
      return result.map(field => field.replace(/^"|"$/g, '').trim());
    }

    async function loadUserCSV() {
      try {
        loadingMessage.textContent = 'Loading user data from user.csv...';
        const response = await fetch('user.csv');
        
        if (!response.ok) {
          throw new Error('user.csv not found. Please create user.csv in the same directory.');
        }
        
        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);
        
        if (lines.length < 2) {
          throw new Error('CSV must have header row and at least one user');
        }
        
        // Parse header row to get module column names
        const headers = parseCSVRow(lines[0]);
        
        // Find username and password indices
        const usernameIndex = headers.findIndex(h => h.toLowerCase() === 'username');
        const passwordIndex = headers.findIndex(h => h.toLowerCase() === 'password');
        
        if (usernameIndex === -1 || passwordIndex === -1) {
          throw new Error('CSV must contain "username" and "password" columns');
        }
        
        // Get module column indices (all columns after password)
        const moduleIndices = [];
        const moduleNames = [];
        
        for (let i = 0; i < headers.length; i++) {
          const header = headers[i];
          if (i !== usernameIndex && i !== passwordIndex && moduleOrder.includes(header)) {
            moduleIndices.push(i);
            moduleNames.push(header);
          }
        }
        
        // Parse each user row
        const users = [];
        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;
          
          const row = parseCSVRow(lines[i]);
          const username = row[usernameIndex]?.trim();
          const password = row[passwordIndex]?.trim();
          
          if (username && password) {
            // Build tabs array based on Show/Hide values
            const tabs = [];
            for (let j = 0; j < moduleIndices.length; j++) {
              const value = row[moduleIndices[j]]?.trim();
              if (value && value.toLowerCase() === 'show') {
                tabs.push(moduleNames[j]);
              }
            }
            
            users.push({ username, password, tabs });
          }
        }
        
        if (users.length === 0) {
          throw new Error('No valid user records found in CSV');
        }
        
        userDatabase = users;
        
        loadingMessage.textContent = `✓ Loaded ${userDatabase.length} users from user.csv`;
        loadingMessage.style.color = '#2ecc71';
        
        // Debug info
        const adminUser = userDatabase.find(u => u.username === 'admin');
        if (adminUser) {
          console.log('Admin user tabs:', adminUser.tabs);
        }
        
        setTimeout(() => {
          loadingMessage.style.display = 'none';
          loginForm.style.display = 'block';
        }, 1000);
        
      } catch (error) {
        console.error('Error:', error);
        loadingMessage.innerHTML = `✗ ${error.message}<br><br>Create user.csv with format:<br>username,password,Attendance,Registration,Distribution,Stock,Monitoring,Reconciliation<br>admin,admin123,Show,Show,Show,Show,Show,Show`;
        loadingMessage.style.color = '#e74c3c';
        loginBtn.disabled = true;
      }
    }

    function renderCards(tabs) {
      console.log('Rendering tabs:', tabs);
      
      cardsContainer.innerHTML = '';
      
      if (!tabs || tabs.length === 0) {
        cardsContainer.innerHTML = `<div style="text-align:center;padding:40px;color:#6f7d95;">No modules assigned to this user. Contact administrator to enable modules.</div>`;
        return;
      }
      
      tabs.forEach(tab => {
        const module = allModules[tab];
        if (!module) return;
        
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-left">
            <div class="card-icon">${module.icon}</div>
            <span class="card-title">${tab}</span>
          </div>
          <div class="card-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
        `;
        card.addEventListener('click', () => {
          moduleIframe.src = module.url;
          dashboardView.style.display = 'none';
          iframeView.style.display = 'flex';
        });
        cardsContainer.appendChild(card);
      });
    }

    function login() {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username || !password) {
        loginError.textContent = 'Please enter username and password';
        return;
      }
      
      const user = userDatabase.find(u => u.username === username && u.password === password);
      
      if (user) {
        currentUser = user.username;
        console.log('Logged in as:', currentUser);
        console.log('User tabs from CSV:', user.tabs);
        
        renderCards(user.tabs);
        dashboardUserInfo.textContent = currentUser;
        
        loginScreen.style.display = 'none';
        dashboardView.style.display = 'flex';
        loginError.textContent = '';
        usernameInput.value = '';
        passwordInput.value = '';
      } else {
        loginError.textContent = 'Invalid username or password';
      }
    }

    function logout() {
      moduleIframe.src = 'about:blank';
      dashboardView.style.display = 'none';
      iframeView.style.display = 'none';
      loginScreen.style.display = 'flex';
    }

    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);
    backButton.addEventListener('click', () => {
      moduleIframe.src = 'about:blank';
      iframeView.style.display = 'none';
      dashboardView.style.display = 'flex';
    });
    
    usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });
    passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') login(); });

    loadUserCSV();
    loginScreen.style.display = 'flex';
    dashboardView.style.display = 'none';
    iframeView.style.display = 'none';
  </script>
</body>
</html>
